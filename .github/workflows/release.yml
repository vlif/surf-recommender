name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # создание GitHub Release
      packages: write   # публикация образа в ghcr.io

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build binary (linux/amd64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o surf-recommender ./cmd/surf-recommender

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: surf-recommender

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/vlif/surf-recommender:${{ github.ref_name }}
            ghcr.io/vlif/surf-recommender:latest

  deploy:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      deployments: write  # создание записей деплоев в GitHub

    environment:
      name: production
      url: https://fly.io/apps/surf-recommender

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --image ghcr.io/vlif/surf-recommender:${{ github.ref_name }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
